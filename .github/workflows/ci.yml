name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    name: Core C++ (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
      - name: Configure
        run: cmake -S Core -B Core/build
      - name: Build
        run: cmake --build Core/build
      - name: Test
        run: ctest --test-dir Core/build --output-on-failure

  ios:
    name: iOS package (SPM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  android:
    name: Android (NDK)
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "29.0.13599879"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"
      - name: Cache OpenSSL for NDK
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: android/openssl/prebuilt
          key: openssl-3.0.15-ndk${{ env.NDK_VERSION }}-${{ hashFiles('android/openssl/build-openssl.sh') }}
      - name: Build OpenSSL for NDK
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" bash android/openssl/build-openssl.sh
      - name: Assemble debug
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
